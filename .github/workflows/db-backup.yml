# IMPL-DR-01: Wöchentlicher Neon PostgreSQL Backup
# Läuft jeden Sonntag um 03:00 UTC
# Speichert pg_dump als GitHub Artifact (90 Tage Retention)

name: DB Backup

on:
  schedule:
    # Sonntag 03:00 UTC (04:00 Berlin Winterzeit, 05:00 Sommerzeit)
    - cron: '0 3 * * 0'
  workflow_dispatch: # Manueller Trigger möglich

env:
  BACKUP_RETENTION_DAYS: 90

jobs:
  backup:
    name: PostgreSQL Backup
    runs-on: ubuntu-latest
    
    steps:
      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          
      - name: Create Backup
        env:
          # DIRECT_URL wird für pg_dump benötigt (nicht Pooler-URL!)
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
        run: |
          # Datum für Dateinamen
          DATE=$(date +%Y-%m-%d_%H%M)
          FILENAME="ka-forstmanager-backup_${DATE}.sql"
          
          # pg_dump ausführen
          echo "Starting pg_dump..."
          pg_dump "$DATABASE_URL" \
            --format=plain \
            --no-owner \
            --no-privileges \
            --verbose \
            > "$FILENAME"
          
          # Backup komprimieren
          gzip "$FILENAME"
          
          # Größe und Checksum ausgeben
          ls -lh "${FILENAME}.gz"
          sha256sum "${FILENAME}.gz" > "${FILENAME}.gz.sha256"
          
          echo "BACKUP_FILE=${FILENAME}.gz" >> $GITHUB_ENV
          echo "CHECKSUM_FILE=${FILENAME}.gz.sha256" >> $GITHUB_ENV
          
      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: |
            ${{ env.BACKUP_FILE }}
            ${{ env.CHECKSUM_FILE }}
          retention-days: ${{ env.BACKUP_RETENTION_DAYS }}
          
      - name: Verify Backup
        run: |
          # Prüfe dass Backup nicht leer ist
          BACKUP_SIZE=$(stat -c%s "${{ env.BACKUP_FILE }}")
          if [ "$BACKUP_SIZE" -lt 1000 ]; then
            echo "❌ Backup zu klein: ${BACKUP_SIZE} Bytes"
            exit 1
          fi
          echo "✅ Backup OK: ${BACKUP_SIZE} Bytes"
          
      - name: Cleanup Old Artifacts (optional)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Alte Backups älter als 90 Tage werden automatisch von GitHub gelöscht
          # Dieser Step ist für zusätzliches Logging
          echo "Backup erfolgreich erstellt. Retention: ${{ env.BACKUP_RETENTION_DAYS }} Tage"
          echo "Artifact Name: db-backup-${{ github.run_number }}"

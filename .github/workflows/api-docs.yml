name: API Docs
on:
  push:
    branches: [main]
    paths:
      - 'prisma/schema.prisma'
      - 'src/app/api/**'

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx prisma generate
      - run: echo "API docs updated"
